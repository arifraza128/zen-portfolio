apiVersion: apps/v1
kind: Deployment
metadata:
  name: zen-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zen
  template:
    metadata:
      labels:
        app: zen
    spec:
      containers:
      - name: zen-container
        image: YOUR_DOCKER_USERNAME/zen-portfolio
        ports:
        - containerPort: 80
